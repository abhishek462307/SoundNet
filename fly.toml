app = "sound-net"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  RATE_LIMIT_PER_MINUTE = "120"
  MCP_HEALTH_INTERVAL_MS = "30000"
  MCP_SYNC_INTERVAL_MS = "60000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/health"
    protocol = "http"
