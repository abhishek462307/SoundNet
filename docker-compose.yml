version: '3.9'

services:
  agent-network:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-network
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_BASE_URL: http://127.0.0.1:3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/agent_network
      API_KEY: ${API_KEY:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      MCP_HEALTH_INTERVAL_MS: ${MCP_HEALTH_INTERVAL_MS:-30000}
      MCP_SYNC_INTERVAL_MS: ${MCP_SYNC_INTERVAL_MS:-60000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: agent-network-postgres
    environment:
      POSTGRES_DB: agent_network
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_network"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
